# Convenience wrapper for customers who prefer an env file over -e flags.
# 1. Copy your token into a local .env:
#      echo "GITHUB_TOKEN=ghp_xxx" > .env
#      # GHES users also add:
#      # echo "GITHUB_API_URL=https://ghes.example.com/api/v3" >> .env
# 2. Run:
#      docker compose run --rm gh-concurrency --repo owner/name --since 2025-05-01
services:
  gh-concurrency:
    image: ghcr.io/buildkite-solutions/gh-concurrency:latest
    env_file: .env
